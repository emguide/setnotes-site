<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background card -->
  <rect x="40" y="20" width="320" height="280" rx="16" fill="#1C1C1E"/>

  <!-- Chart card inner -->
  <rect x="60" y="40" width="280" height="160" rx="12" fill="#2C2C2E"/>

  <!-- Y-axis label lines -->
  <line x1="88" y1="60" x2="88" y2="184" stroke="#3A3A3C" stroke-width="1"/>
  <line x1="88" y1="184" x2="320" y2="184" stroke="#3A3A3C" stroke-width="1"/>

  <!-- Horizontal grid lines -->
  <line x1="88" y1="144" x2="320" y2="144" stroke="#3A3A3C" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="88" y1="112" x2="320" y2="112" stroke="#3A3A3C" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="88" y1="80" x2="320" y2="80" stroke="#3A3A3C" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="82" y="188" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="end">0</text>
  <text x="82" y="148" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="end">100</text>
  <text x="82" y="116" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="end">200</text>
  <text x="82" y="84" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="end">300</text>

  <!-- Trend area fill (gradient) -->
  <defs>
    <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9500" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FF9500" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <path d="M96 175 L128 168 L160 158 L192 148 L224 132 L256 118 L288 100 L312 84 L312 184 L96 184 Z" fill="url(#trendGrad)"/>

  <!-- Trend line -->
  <polyline points="96,175 128,168 160,158 192,148 224,132 256,118 288,100 312,84"
            stroke="#FF9500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Data point dots -->
  <circle cx="96" cy="175" r="3.5" fill="#FF9500"/>
  <circle cx="128" cy="168" r="3.5" fill="#FF9500"/>
  <circle cx="160" cy="158" r="3.5" fill="#FF9500"/>
  <circle cx="192" cy="148" r="3.5" fill="#FF9500"/>
  <circle cx="224" cy="132" r="3.5" fill="#FF9500"/>
  <circle cx="256" cy="118" r="3.5" fill="#FF9500"/>
  <circle cx="288" cy="100" r="3.5" fill="#FF9500"/>
  <!-- Last point larger + glow -->
  <circle cx="312" cy="84" r="6" fill="#FF9500" opacity="0.3"/>
  <circle cx="312" cy="84" r="4.5" fill="#FF9500"/>

  <!-- X-axis labels -->
  <text x="96" y="198" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="middle">Jan</text>
  <text x="160" y="198" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="middle">Feb</text>
  <text x="224" y="198" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="middle">Mar</text>
  <text x="288" y="198" font-family="-apple-system, SF Pro Text, sans-serif" font-size="9" fill="#636366" text-anchor="middle">Apr</text>

  <!-- PR Badge -->
  <rect x="274" y="56" width="46" height="22" rx="11" fill="#FF9500"/>
  <text x="297" y="71" font-family="-apple-system, SF Pro Display, sans-serif" font-size="11" fill="white" font-weight="700" text-anchor="middle">🏆 PR</text>

  <!-- Stats row below chart -->
  <rect x="60" y="212" width="84" height="64" rx="12" fill="#2C2C2E"/>
  <rect x="158" y="212" width="84" height="64" rx="12" fill="#2C2C2E"/>
  <rect x="256" y="212" width="84" height="64" rx="12" fill="#2C2C2E"/>

  <!-- Streak stat -->
  <text x="102" y="238" font-family="-apple-system, SF Pro Display, sans-serif" font-size="20" fill="#FF9500" font-weight="700" text-anchor="middle">14</text>
  <text x="102" y="256" font-family="-apple-system, SF Pro Text, sans-serif" font-size="10" fill="#636366" text-anchor="middle">day streak</text>
  <text x="102" y="269" font-family="-apple-system, SF Pro Text, sans-serif" font-size="16" text-anchor="middle">🔥</text>

  <!-- Volume stat -->
  <text x="200" y="238" font-family="-apple-system, SF Pro Display, sans-serif" font-size="20" fill="#FF9500" font-weight="700" text-anchor="middle">+18%</text>
  <text x="200" y="256" font-family="-apple-system, SF Pro Text, sans-serif" font-size="10" fill="#636366" text-anchor="middle">volume</text>
  <text x="200" y="269" font-family="-apple-system, SF Pro Text, sans-serif" font-size="16" text-anchor="middle">📈</text>

  <!-- Workouts stat -->
  <text x="298" y="238" font-family="-apple-system, SF Pro Display, sans-serif" font-size="20" fill="#FF9500" font-weight="700" text-anchor="middle">47</text>
  <text x="298" y="256" font-family="-apple-system, SF Pro Text, sans-serif" font-size="10" fill="#636366" text-anchor="middle">workouts</text>
  <text x="298" y="269" font-family="-apple-system, SF Pro Text, sans-serif" font-size="16" text-anchor="middle">💪</text>
</svg>
