<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- White background -->
  <rect width="400" height="280" fill="#FFFFFF"/>

  <!-- Notebook ruled lines -->
  <line x1="0" y1="44"  x2="400" y2="44"  stroke="#C8D8F0" stroke-width="1"/>
  <line x1="0" y1="88"  x2="400" y2="88"  stroke="#C8D8F0" stroke-width="1"/>
  <line x1="0" y1="132" x2="400" y2="132" stroke="#C8D8F0" stroke-width="1"/>
  <line x1="0" y1="176" x2="400" y2="176" stroke="#C8D8F0" stroke-width="1"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#C8D8F0" stroke-width="1"/>
  <line x1="0" y1="264" x2="400" y2="264" stroke="#C8D8F0" stroke-width="1"/>

  <!-- Row 1: Exercise name pill — "Barbell Bench Press >" -->
  <!-- Pill background -->
  <rect x="10" y="16" width="200" height="34" rx="17" fill="#FF9500" fill-opacity="0.15" stroke="#FF9500" stroke-width="1.5"/>
  <!-- Exercise name text -->
  <text x="20" y="38" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="17" fill="#E07800" font-weight="600">Barbell Bench Press ></text>

  <!-- Row 2: "10@135 warmup" -->
  <!-- "10@135" underlined in orange -->
  <text x="20" y="82" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="17" fill="#1C1C1E">10@135 warmup</text>
  <!-- Underline under "10@135" -->
  <line x1="20" y1="85" x2="82" y2="85" stroke="#E07800" stroke-width="1.5"/>

  <!-- Row 3: "5,5,5@185 work sets" -->
  <text x="20" y="126" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="17" fill="#1C1C1E">5,5,5@185 work sets</text>
  <!-- Underline under "5,5,5@185" -->
  <line x1="20" y1="129" x2="106" y2="129" stroke="#E07800" stroke-width="1.5"/>

  <!-- Row 4: "3@205 then 5@135 to failure" -->
  <text x="20" y="170" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="17" fill="#1C1C1E">3@205 then 5@135 to failure</text>
  <!-- Underline under "3@205" -->
  <line x1="20" y1="173" x2="67" y2="173" stroke="#E07800" stroke-width="1.5"/>
  <!-- Underline under "5@135" -->
  <line x1="112" y1="173" x2="159" y2="173" stroke="#E07800" stroke-width="1.5"/>

  <!-- Row 5: blank line with cursor -->
  <rect x="20" y="196" width="2" height="20" rx="1" fill="#1C1C1E" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle bottom fade to suggest more content -->
  <rect x="0" y="230" width="400" height="50" fill="url(#fadeWhite)"/>

  <defs>
    <linearGradient id="fadeWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>
