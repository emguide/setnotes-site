    <text x="100" y="168" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#48484A">• Leg Press  4×10</text>
    <text x="100" y="186" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#48484A">• Romanian DL  3×12</text>
  </g>

  <!-- Card 2 (middle) — Pull Day -->
  <g transform="rotate(-3, 200, 180)">
    <rect x="72" y="72" width="256" height="162" rx="16" fill="#38383A"/>
    <rect x="72" y="72" width="256" height="50" rx="16" fill="#4A4A4C"/>
    <rect x="72" y="106" width="256" height="16" fill="#4A4A4C"/>
    <text x="162" y="103" font-family="-apple-system, SF Pro Display, sans-serif" font-size="15" fill="#8E8E93" font-weight="700">Pull Day</text>
    <text x="92" y="142" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#636366">• Deadlift  3×5</text>
    <text x="92" y="160" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#636366">• Barbell Row  4×8</text>
    <text x="92" y="178" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#636366">• Pull-ups  3×max</text>
    <text x="92" y="196" font-family="-apple-system, SF Pro Text, sans-serif" font-size="11" fill="#636366">• Face Pulls  3×15</text>
  </g>

  <!-- Card 1 (front) — Push Day -->
  <rect x="64" y="60" width="272" height="176" rx="16" fill="#1C1C1E"/>
  <!-- Drop shadow -->
  <rect x="64" y="60" width="272" height="176" rx="16" fill="none" stroke="#3A3A3C" stroke-width="1"/>

  <!-- Header accent -->
  <rect x="64" y="60" width="272" height="56" rx="16" fill="#2C2C2E"/>
  <rect x="64" y="100" width="272" height="16" fill="#2C2C2E"/>

  <!-- Orange accent bar -->
  <rect x="64" y="60" width="6" height="176" rx="3" fill="#FF9500"/>

  <!-- Header content -->
  <text x="88" y="86" font-family="-apple-system, SF Pro Display, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Push Day</text>
  <text x="88" y="104" font-family="-apple-system, SF Pro Text, sans-serif" font-size="10" fill="#636366">5 exercises · ~60 min</text>

  <!-- Exercise list -->
  <text x="84" y="136" font-family="-apple-system, SF Pro Text, sans-serif" font-size="12" fill="#E0E0E0">Bench Press</text>
  <text x="296" y="136" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF9500" text-anchor="end">5×5</text>

  <line x1="80" y1="145" x2="320" y2="145" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="84" y="162" font-family="-apple-system, SF Pro Text, sans-serif" font-size="12" fill="#E0E0E0">Incline DB Press</text>
  <text x="296" y="162" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF9500" text-anchor="end">3×10</text>

  <line x1="80" y1="171" x2="320" y2="171" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="84" y="188" font-family="-apple-system, SF Pro Text, sans-serif" font-size="12" fill="#E0E0E0">Overhead Press</text>
  <text x="296" y="188" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF9500" text-anchor="end">4×8</text>

  <line x1="80" y1="197" x2="320" y2="197" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="84" y="214" font-family="-apple-system, SF Pro Text, sans-serif" font-size="12" fill="#E0E0E0">Cable Fly</text>
  <text x="296" y="214" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF9500" text-anchor="end">3×12</text>

  <!-- Load button -->
  <rect x="192" y="248" width="160" height="36" rx="18" fill="#FF9500"/>
  <text x="272" y="271" font-family="-apple-system, SF Pro Text, sans-serif" font-size="14" fill="white" font-weight="600" text-anchor="middle">Load Template</text>
