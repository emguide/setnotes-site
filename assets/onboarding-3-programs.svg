<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Card 3 (back) — Legs Day -->
  <g transform="rotate(-8, 200, 180)">
    <rect x="80" y="80" width="240" height="150" rx="16" fill="#2C2C2E"/>
    <rect x="80" y="80" width="240" height="48" rx="16" fill="#3A3A3C"/>
    <rect x="80" y="112" width="240" height="16" fill="#3A3A3C"/>
